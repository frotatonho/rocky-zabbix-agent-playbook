---
- name: Install and configure Zabbix Agent 7.4.7 on Rocky Linux
  hosts: all
  become: true
  vars:
    zabbix_server: "172.31.0.117"
    zabbix_version: "7.4.7"

  tasks:
    - name: Ensure EPEL repository is installed
      ansible.builtin.dnf:
        name: epel-release
        state: present

    - name: Add Zabbix repository
      ansible.builtin.dnf_repository:
        name: zabbix
        description: "Zabbix official repository"
        baseurl: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/rhel/8/x86_64/"
        gpgcheck: yes
        gpgkey: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/rhel/8/x86_64/RPM-GPG-KEY-ZABBIX"
        enabled: yes

    - name: Install Zabbix agent
      ansible.builtin.dnf:
        name: zabbix-agent
        state: present

    - name: Configure Zabbix agent to point to the server
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Server='
        line: "Server={{ zabbix_server }}"
        create: yes

    - name: Configure Zabbix agent hostname
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Hostname='
        line: "Hostname={{ inventory_hostname }}"
        create: yes

    - name: Enable and start Zabbix agent service
      ansible.builtin.systemd:
        name: zabbix-agent
        enabled: yes
        state: started

    - name: Open Zabbix agent port in firewall (10050)
      ansible.posix.firewalld:
        port: 10050/tcp
        permanent: true
        state: enabled
        immediate: yes
